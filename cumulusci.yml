minimum_cumulusci_version: '3.43.0'
project:
    name: FormBuilder
    package:
        name: 'Flow Tool Kit: Form and Table Builder'
        namespace: FlowToolKit
        api_version: '64.0'
    git:
    source_format: sfdx


sources:
    snowfakery:
            github: 'https://github.com/SFDO-Tooling/Snowfakery'

plans:
    install:
        slug: install
        title: Install Flow Tool Kit
        tier: primary
        checks:
            - when: "not tasks.check_lws_enabled()['is_enabled']"
              action: error
              message: "Lightning Web Security (LWS) must be enabled. Go to Setup → Session Settings → enable 'Use Lightning Web Security for Lightning web components'. Without LWS, forms with large datasets will experience severe performance degradation."
            - when: "not tasks.check_enhanced_email()['is_enabled']"
              action: error
              message: "Enhanced Email must be enabled. Go to Setup → Enhanced Email to enable it. Flow Tool Kit requires Enhanced Email as a package dependency."
        steps:
            1:
                flow: install_prod
            2:
                task: deploy
                options:
                    path: unpackaged/post/config
                ui_options:
                    name: "Deploy Default Configuration (Custom Metadata)"
                    is_required: False
                    is_recommended: True

    upgrade:
        slug: upgrade
        title: Upgrade Flow Tool Kit
        tier: additional
        is_listed: False
        preflight_message: "This upgrades Flow Tool Kit and its dependencies to the latest version. Existing custom metadata records will not be modified."
        checks:
            - when: "not tasks.check_lws_enabled()['is_enabled']"
              action: error
              message: "Lightning Web Security (LWS) must be enabled. Go to Setup → Session Settings → enable 'Use Lightning Web Security for Lightning web components'. Without LWS, forms with large datasets will experience severe performance degradation."
            - when: "not tasks.check_enhanced_email()['is_enabled']"
              action: error
              message: "Enhanced Email must be enabled. Go to Setup → Enhanced Email to enable it. Flow Tool Kit requires Enhanced Email as a package dependency."
        steps:
            1:
                task: update_dependencies
            2:
                task: install_managed

flows:

    dev_org:
        steps:
            5:
                task: assign_permission_sets
                options:
                    api_names: Form_Builder_Admin,Form_Flow_User
            6:
                task: snowfakery
                description: Load standard test data (Form Template + Campaigns)
                options:
                    recipe: datasets/default/sample_data.recipe.yml

    npc_dev_org:
        description: Set up an NPC scratch org with Grantmaking, OmniStudio, Action Plans, and Experience Cloud
        steps:
            1:
                flow: dependencies
            2:
                flow: deploy_unmanaged
            3:
                task: deploy_post
                options:
                    path: unpackaged/post
                    namespace_inject: FlowToolKit
            4:
                task: assign_permission_sets
                options:
                    api_names: Form_Builder_Admin,Form_Flow_User
            5:
                task: assign_permission_set_licenses
                options:
                    api_names: OmniStudioDesigner,ActionPlansPsl,GrantmakingPsl,FundraisingAccessPsl,ProgramManagementPsl,DynamicAssessmentPsl,GroupMembershipPsl,DocumentChecklistPsl,CarePlansPermissionSetLicense,IndustriesAssessmentPsl
                ignore_failure: True
            6:
                task: assign_permission_sets
                options:
                    api_names: OmniStudioAdmin,OmniStudioExecution,ActionPlans,GrantmakingManager,FundraisingAccess,AdvancedProgramManagement,DynamicAssessmentPsl,GroupMembershipPsl,AnalyticsStoreUser,DocumentChecklist,CarePlansPermissionSetLicense,IndustriesAssessmentPermissionSet,IndustriesInteractionSummaryPsl,Fundraising_Admin
                ignore_failure: True
            7:
                task: execute_anon
                options:
                    path: datasets/npc/setup_admin_user.apex
                ignore_failure: True
            8:
                task: deploy
                options:
                    path: force-app-npc
                ui_options:
                    name: "Deploy NPC Configuration (fields, profiles, LWC, Apex, Flows, FlexiPages, List Views, Settings, Sharing)"
            10:
                task: execute_anon
                options:
                    path: datasets/npc/load_npc_stage_definitions.apex
                ignore_failure: True
            10.1:
                task: generate_and_load_from_yaml
                options:
                    generator_yaml: datasets/npc/npc_sample_data.recipe.yml
                ignore_failure: True
            10.2:
                task: execute_anon
                options:
                    path: datasets/npc/load_npc_sample_accounts.apex
                ignore_failure: True
            10.3:
                task: execute_anon
                options:
                    path: datasets/npc/load_npc_sample_data.apex
                ignore_failure: True
            11:
                task: create_community
                options:
                    template: Grantmaking
                    name: Grantmaking Portal
                    url_path_prefix: grantmaking
                ignore_failure: True
            12:
                task: publish_community
                options:
                    name: Grantmaking Portal
                ignore_failure: True
            12.1:
                task: deploy
                options:
                    path: unpackaged/npc-post-community
                ui_options:
                    name: "Deploy EC Navigation Menu (post-community)"
                ignore_failure: True
            12.2:
                task: publish_community
                options:
                    name: Grantmaking Portal
                ignore_failure: True
            13:
                task: execute_anon
                options:
                    path: datasets/npc/add_network_members.apex
                ignore_failure: True
            14:
                task: execute_anon
                options:
                    path: datasets/npc/create_portal_users.apex
                ignore_failure: True
            15:
                task: snapshot_changes

    release_2gp_beta:
        steps:
            90:
                task: github_copy_subtree
                options:
                    tag_name: "latest_beta"


    release_2gp_production:
        steps:
            90:
                task: github_copy_subtree
                options:
                    tag_name: "latest"

tasks:

    export_form:
        class_path: cci_flowtoolkit_tasks.export_form.ExportFormMetadata

    check_lws_enabled:
        class_path: tasks.check_lws_enabled.CheckLWSEnabled
        description: Check if Lightning Web Security (LWS) is enabled

    check_enhanced_email:
        class_path: tasks.check_enhanced_email.CheckEnhancedEmailEnabled
        description: Check if Enhanced Email is enabled

    create_package_version:
        options:
            post_install_script: InstallScript

    github_copy_subtree:
        options:
            repo_url: "https://github.com/common-unite/Flow_Tool_Kit_Public"
            branch: "main"
            create_release: true
            release_body: true
            include: [ "cumulusci.yml","sfdx-project.json","orgs/","README.md","documents/" ]

    robot:
        options:
            suites: robot/FormBuilder/tests
            options:
                outputdir: robot/FormBuilder/results

    robot_testdoc:
        options:
            path: robot/FormBuilder/tests
            output: robot/FormBuilder/doc/FormBuilder_tests.html

    run_tests:
        options:
            required_org_code_coverage_percent: 90


orgs:
    scratch:
        build:
            config_file: orgs/build.json

        packaging:
            config_file: orgs/packaging.json

        dev:
            config_file: orgs/dev.json
            days: 30
            namespaced: True

        feature_get-sobject-type-invocable:
            config_file: orgs/dev.json
            days: 7
            namespaced: True

        feature_review-display-type:
            config_file: orgs/dev.json
            days: 7
            namespaced: True

        feature_hide-headers-dividers:
            config_file: orgs/dev.json
            days: 7
            namespaced: True

        feature_npc-action-plan-integration:
            config_file: orgs/npc.json
            days: 7
            namespaced: True

        feature_campaign-form-template:
            config_file: orgs/dev.json
            days: 7
            namespaced: True
